<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Kaos Tech</title>
    <meta name="description" content="Page not found - Let's get you back on track">
    
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/404.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap">
</head>
<body class="error-page">
    <div class="stars"></div>
    
    <div class="error-container">
        <!-- Floating Code Background Elements -->
        <div class="code-block code-1">{ }</div>
        <div class="code-block code-2">[ ]</div>
        <div class="code-block code-3">< /></div>
        <div class="code-block code-4">const</div>
        <div class="code-block code-5">return</div>
        
        <!-- Main Content -->
        <div class="error-content">
            <div class="error-code-container">
                <h1 class="error-code">4<span class="zero">0</span>4</h1>
                <div class="glitch" data-text="ERROR">ERROR</div>
            </div>
            
            <h2 class="error-title">Lost in the Digital Void</h2>
            <p class="error-description">
                We couldn't find the page you're looking for. It either doesn't exist or it's been encrypted beyond our reach.
            </p>
            
            <!-- Tech Stats -->
            <div class="tech-stats">
                <div class="stat">
                    <span class="stat-label">Status Code</span>
                    <span class="stat-value">404</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Route</span>
                    <span class="stat-value">/404</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Error Type</span>
                    <span class="stat-value">NOT_FOUND</span>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="error-actions">
                <a href="/" class="btn btn-primary">
                    <span class="btn-icon">⟲</span> Return Home
                </a>
                <a href="/contact" class="btn btn-secondary">
                    Report Issue
                </a>
            </div>
            
            <!-- Additional Info -->
            <div class="error-info">
                <p>Need help? <a href="/contact">Get in touch with our team</a></p>
            </div>
        </div>
        
        <!-- Circuit Board Effect -->
        <div class="circuit-board"></div>
    </div>
    
    <script src="/js/404.js"></script>
</body>
</html>
